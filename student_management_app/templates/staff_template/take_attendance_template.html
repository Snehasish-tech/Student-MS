{% extends 'base.html' %}

{% block content %}
<div class="container mt-4 mb-5">
  <h3>Take Attendance</h3>
  <div class="card p-3 mb-3">
    <div class="row">
      <div class="col-md-4 mb-2">
        <label>Subject</label>
        <select id="subject" class="form-control">
          <option value="">Select Subject</option>
          {% for subject in subjects %}
            <option value="{{ subject.id }}">{{ subject.subject_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4 mb-2">
        <label>Session Year</label>
        <select id="session_year" class="form-control">
          <option value="">Select Session</option>
          {% for year in session_years %}
            <option value="{{ year.id }}">{{ year.session_start_year }} - {{ year.session_end_year }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4 mb-2">
        <label>Attendance Date</label>
        <input type="date" id="attendance_date" class="form-control">
      </div>
    </div>
    <div class="mt-2">
      <button class="btn btn-secondary" id="fetch_students">Fetch Students</button>
      <a href="{% url 'staff_home' %}" class="btn btn-light">Back</a>
    </div>
  </div>

  <div class="card p-3">
    <div class="table-responsive">
      <table class="table table-bordered table-sm" id="students_table">
        <thead>
          <tr>
            <th>Student</th>
            <th>Present</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <button class="btn btn-primary" id="save_attendance">Save Attendance</button>
  </div>
</div>

<script>
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

function normalizeData(payload) {
  if (typeof payload === 'string') {
    try { return JSON.parse(payload); } catch (e) { return []; }
  }
  return payload;
}

document.getElementById('fetch_students').addEventListener('click', function() {
  const subject = document.getElementById('subject').value;
  const sessionYear = document.getElementById('session_year').value;
  if (!subject || !sessionYear) {
    alert('Select subject and session year first.');
    return;
  }

  const formData = new FormData();
  formData.append('subject', subject);
  formData.append('session_year', sessionYear);

  fetch("{% url 'get_students' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': getCookie('csrftoken') },
    body: formData
  })
  .then((response) => response.json())
  .then((data) => {
    const students = normalizeData(data);
    const tbody = document.querySelector('#students_table tbody');
    tbody.innerHTML = '';
    students.forEach((student) => {
      const row = document.createElement('tr');
      row.innerHTML = '<td>' + student.name + '</td>' +
                      '<td><input type="checkbox" class="attendance-checkbox" data-student-id="' + student.id + '" checked></td>';
      tbody.appendChild(row);
    });
  });
});

document.getElementById('save_attendance').addEventListener('click', function() {
  const subject = document.getElementById('subject').value;
  const sessionYear = document.getElementById('session_year').value;
  const attendanceDate = document.getElementById('attendance_date').value;
  if (!subject || !sessionYear || !attendanceDate) {
    alert('Fill subject, session year and attendance date.');
    return;
  }

  const studentIds = [];
  document.querySelectorAll('.attendance-checkbox').forEach((checkbox) => {
    studentIds.push({
      id: checkbox.getAttribute('data-student-id'),
      status: checkbox.checked
    });
  });

  const formData = new FormData();
  formData.append('student_ids', JSON.stringify(studentIds));
  formData.append('subject_id', subject);
  formData.append('attendance_date', attendanceDate);
  formData.append('session_year_id', sessionYear);

  fetch("{% url 'save_attendance_data' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': getCookie('csrftoken') },
    body: formData
  })
  .then((response) => response.text())
  .then((result) => {
    if (result === 'OK') {
      alert('Attendance saved successfully.');
    } else {
      alert('Failed to save attendance.');
    }
  });
});
</script>
{% endblock content %}
