{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
  .student-page {
    background: #f5f7fa;
    min-height: 100vh;
    padding: 28px 0 40px;
  }

  .top-nav {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 20px;
  }

  .top-nav a {
    color: #0f172a;
    text-decoration: none;
    font-weight: 600;
    margin-right: 16px;
  }

  .top-nav a:hover {
    color: #0284c7;
  }

  .card-box {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 24px;
  }

  .page-title {
    font-size: 1.4rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 16px;
  }

  .btn-primary-custom {
    background: linear-gradient(135deg, #0284c7, #0369a1);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 700;
  }

  .btn-primary-custom:hover {
    color: #fff;
    opacity: 0.95;
  }
</style>

<div class="student-page">
  <div class="container">
    <div class="top-nav">
      <a href="{% url 'student_home' %}">Dashboard</a>
      <a href="{% url 'student_profile' %}">Profile</a>
      <a href="{% url 'student_view_attendance' %}">Attendance</a>
      <a href="{% url 'student_view_result' %}">Results</a>
      <a href="{% url 'logout_user' %}">Logout</a>
    </div>

    <div class="card-box">
      <h3 class="page-title">My Profile</h3>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'student_profile_update' %}">
        {% csrf_token %}
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" required>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Email</label>
              <input type="email" class="form-control" value="{{ user.email }}" readonly>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>New Password (Optional)</label>
              <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current password">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea name="address" rows="3" class="form-control">{{ student.address }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary-custom">Update Profile</button>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
